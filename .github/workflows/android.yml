name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixes Node.js 20 deprecation warning

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Setup Node / Java / Gradle (with caching disabled)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Clear Gradle Cache
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf ~/.gradle/wrapper

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2
        validate-wrappers: false
        cache-disabled: true # Completely disable to avoid using corrupted cache

    # Install dependencies and build web app
    - name: Install Web Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    # Sync Capacitor (npx cap sync android)
    - name: Sync Capacitor
      run: npx cap sync android

    # Regenerate Wrapper (gradle wrapper in the android folder)
    - name: Regenerate Wrapper
      working-directory: android
      run: gradle wrapper

    # Grant execute permissions (chmod +x android/gradlew)
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    # Build Android APK (./gradlew assembleDebug --no-daemon)
    - name: Build Android APK
      working-directory: android
      # Using requested flags to force clean build and avoid locking issues
      run: ./gradlew assembleDebug --no-daemon --refresh-dependencies

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: loki-prime-x-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
