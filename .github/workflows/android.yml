name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix All Permissions (The Magic Trick)
        run: sudo chmod -R 777 android/

      - name: Generate Fresh Wrapper & Wipe Cache
        working-directory: android
        run: |
          rm -rf ~/.gradle/caches/
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Clean Old Build Junk
        working-directory: android
        run: ./gradlew clean --no-daemon

      - name: Build APK (Final Stand)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --no-parallel --max-workers=1
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
