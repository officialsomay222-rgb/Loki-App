name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Exact Gradle 8.2 (Official)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'
          cache-disabled: true
          validate-wrappers: false

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (Bypass Wrapper & Cache Entirely)
        working-directory: android
        # Yahan hum './gradlew' ki jagah direct 'gradle' use kar rahe hain
        # Aur '--gradle-user-home' se cache ko completely isolate kar rahe hain!
        run: gradle assembleDebug --no-daemon --gradle-user-home ./.gradle-local-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
