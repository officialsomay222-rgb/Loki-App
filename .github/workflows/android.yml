name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# YEH LINE WAPAS ADD KI HAI: Naya folder banayega taaki purane kachre mein na jaye
env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.custom-gradle-home

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Perfect Wrapper
        working-directory: android
        run: |
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build APK (The Ultimate Fix)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --no-parallel --max-workers=1 --refresh-dependencies

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
